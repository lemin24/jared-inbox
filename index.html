<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jared Inbox Fix</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; padding: 20px; text-align: center; }
        .container { background: #1e293b; padding: 20px; border-radius: 15px; max-width: 400px; margin: auto; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #475569; background: #0f172a; color: #60a5fa; }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .btn-check { background: #22c55e; color: white; }
        #display { background: #0f172a; padding: 15px; border-radius: 10px; margin-top: 10px; min-height: 50px; word-break: break-all; color: #22c55e; }
    </style>
</head>
<body>
    <div class="container">
        <h2>📬 Jared Inbox</h2>
        <input type="text" id="username" placeholder="Username (e.g. gork9eng)">
        <button class="btn-check" onclick="fetchData()">CHECK INBOX</button>
        <div id="display">Waiting for input...</div>
    </div>

    <script>
        const API_KEY = "b59e464c567a2ce3de4b30e3c83a34d8"; 
        const DS_ID = "ds_1OuNodY"; 

        async function fetchData() {
            const user = document.getElementById('username').value.trim();
            if(!user) return alert("Enter name!");
            
            const targetEmail = user + "@jared.work.gd";
            const display = document.getElementById('display');
            display.innerHTML = "🔍 Fetching via Proxy...";

            // Gagamit tayo ng proxy para ma-bypass ang CORS
            const apiUrl = `https://api.pipedream.com/v1/data_stores/${DS_ID}/keys/${targetEmail}`;
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(apiUrl)}`;

            try {
                const res = await fetch(proxyUrl, {
                    headers: { "Authorization": `Bearer ${API_KEY}` }
                });
                const data = await res.json();
                
                // Ang allorigins ay nagbabalik ng string sa data.contents
                const pipedreamData = JSON.parse(data.contents);

                if (pipedreamData.value) {
                    display.innerHTML = "<b>LATEST CODE:</b><br>" + pipedreamData.value;
                } else {
                    display.innerHTML = "❌ No code found for " + targetEmail;
                }
            } catch (e) {
                display.innerHTML = "🚫 Error: " + e.message;
            }
        }
    </script>
</body>
</html>
